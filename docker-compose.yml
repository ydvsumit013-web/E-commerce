version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: infotact-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: infotact

  redis:
    image: redis:7-alpine
    container_name: infotact-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: infotact-server
    restart: unless-stopped
    ports:
      - '5050:5050'
    environment:
      PORT: 5050
      MONGODB_URI: mongodb://mongo:27017/infotact
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretjwtkey_changeme_in_production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
    depends_on:
      - mongo
      - redis

volumes:
  mongo_data:
  redis_data:
